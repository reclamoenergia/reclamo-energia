<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wizard pratica energia | Reclamo Energia</title>
  <meta name="description" content="Wizard guidato mobile-first per creare il tuo documento energia prima del checkout." />
  <meta property="og:title" content="Wizard Reclamo Energia" />
  <meta property="og:description" content="Compila la pratica in 4 step e verifica il riepilogo prima del pagamento." />
  <link rel="stylesheet" href="/assets/app.css" />
  <script src="/js/consent.js" defer></script>
  <script src="/js/wizard.js" defer></script>
</head>
<body>
<main class="wrap">
  <section class="card">
    <h1>Compila la pratica in modo guidato</h1>
    <p class="muted">Flusso in 4 step. I dati vengono validati client e server.</p>
    <div class="progress" id="progress"><span class="active"></span><span></span><span></span><span></span></div>

    <form id="wizardForm" novalidate>
      <div class="step active" data-step="1">
        <h2>1) Tipo pratica</h2>
        <div class="grid two">
          <div><label for="type">Tipologia</label><select id="type" name="type"><option value="reclamo">Reclamo bolletta</option><option value="rateizzazione">Rateizzazione</option><option value="contatore">Verifica contatore</option><option value="voltura">Voltura</option></select><div class="error" data-error="type"></div></div>
          <div><label for="reason">Motivo</label><select id="reason" name="reason"><option value="importo">Importo anomalo</option><option value="stimata">Lettura stimata errata</option><option value="doppia">Doppia fatturazione</option><option value="voci">Voci non previste</option><option value="generale">Generale</option></select><div class="error" data-error="reason"></div></div>
          <div><label for="supplyType">Fornitura</label><select id="supplyType" name="supplyType"><option value="Luce">Luce</option><option value="Gas">Gas</option></select><div class="error" data-error="supplyType"></div></div>
          <div><label for="supplierName">Fornitore</label><input id="supplierName" name="supplierName" placeholder="Es. Enel Energia" /><div class="error" data-error="supplierName"></div></div>
          <div><label for="supplierPec">PEC fornitore (opzionale)</label><input id="supplierPec" name="supplierPec" /><div class="error" data-error="supplierPec"></div></div>
        </div>
      </div>

      <div class="step" data-step="2">
        <h2>2) Dati cliente</h2>
        <div class="grid two">
          <div><label for="fullName">Nome e cognome</label><input id="fullName" name="fullName" /><div class="error" data-error="fullName"></div></div>
          <div><label for="email">Email</label><input id="email" name="email" /><div class="error" data-error="email"></div></div>
          <div><label for="pec">PEC personale (opzionale)</label><input id="pec" name="pec" /></div>
          <div><label for="phone">Telefono (opzionale)</label><input id="phone" name="phone" /></div>
          <div style="grid-column: 1 / -1"><label for="address">Indirizzo</label><input id="address" name="address" /><div class="error" data-error="address"></div></div>
        </div>
      </div>

      <div class="step" data-step="3">
        <h2>3) Dettagli pratica</h2>
        <div class="grid two">
          <div><label for="customerCode">Codice cliente</label><input id="customerCode" name="customerCode" /></div>
          <div><label for="invoiceNumber">Numero fattura</label><input id="invoiceNumber" name="invoiceNumber" /></div>
          <div><label for="invoiceDate">Data fattura</label><input id="invoiceDate" name="invoiceDate" type="date" /></div>
          <div><label for="invoiceAmount">Importo fattura (€)</label><input id="invoiceAmount" name="invoiceAmount" /></div>
          <div style="grid-column: 1 / -1"><label for="supplyAddress">Indirizzo fornitura</label><input id="supplyAddress" name="supplyAddress" /></div>
          <div style="grid-column: 1 / -1"><label for="description">Descrizione caso</label><textarea id="description" name="description"></textarea></div>
        </div>
      </div>

      <div class="step" data-step="4">
        <h2>4) Riepilogo e checkout</h2>
        <p class="muted">Controlla i dati prima di procedere al pagamento.</p>
        <div id="summary" class="summary"></div>
        <p class="muted">Prezzo finale: <strong>7€</strong> una tantum.</p>
      </div>

      <div class="inline" style="margin-top:16px; justify-content:space-between;">
        <button type="button" class="btn" id="prevBtn">Indietro</button>
        <div>
          <button type="button" class="btn" id="nextBtn">Continua</button>
          <button type="submit" class="btn primary" id="submitBtn" style="display:none;">Vai al checkout</button>
        </div>
      </div>
      <p id="formFeedback" class="muted"></p>
    </form>
  </section>
</main>
</body>
</html>
